# Nginx Configuration Segment for TQ Auto Chat Server (WebSocket support)
# Copy this block inside your VPS server block configuration (typically /etc/nginx/sites-available/default)

server {
    listen 80;
    server_name yourdomain.com; # Replace with your VPS domain or IP address

    # Next.js Application Frontend & REST APIs
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket Socket.IO Route proxying to port 3001
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001/socket.io/;
        proxy_http_version 1.1;
        
        # Headers required for WebSockets/upgrades
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts adjustments (to prevent early disconnects)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
